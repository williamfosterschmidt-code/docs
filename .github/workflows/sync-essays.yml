name: Sync Substack Essays

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 python-dateutil

      - name: Run essay sync
        run: python .github/scripts/sync_essays.py

      - name: Configure git
        run: |
          git config --global user.name "Essay Sync Bot"
          git config --global user.email "bot@lifeonafaultline.com"

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "$(cat /tmp/commit_message.txt 2>/dev/null || echo 'Update essays from Substack')"
            git push
          fi
